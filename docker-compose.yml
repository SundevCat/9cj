version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: 9cj-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: 9cj
      POSTGRES_PASSWORD: 9cj_secret
      POSTGRES_DB: 9cj_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U 9cj -d 9cj_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: 9cj-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@9cj.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:
